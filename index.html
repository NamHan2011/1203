<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Đếm Thời Gian</title>
<style>
  :root {
    --glow: 244, 114, 182; /* hồng sen - lotus pink */
    --glass-1: rgba(255,255,255,0.08);
    --glass-2: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #07070a;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Arial, sans-serif;
  }

  /* ===== Nền lưới caro di chuyển lên ===== */
  .grid-bg {
    position: fixed;
    top: -42px; left: 0; right: 0; bottom: -42px;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 42px 42px;
    animation: gridMove 6s linear infinite;
    will-change: transform;
    contain: strict;
    z-index: 0;
  }

  @keyframes gridMove {
    from { transform: translateY(0); }
    to   { transform: translateY(-42px); }
  }

  /* ===== Quầng sáng nền cho chiều sâu kiểu "liquid glass" ===== */
  .glow-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    z-index: 0;
    pointer-events: none;
  }
  .glow-blob.pink {
    width: 550px; height: 550px;
    top: 8%; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(var(--glow),0.18), transparent 70%);
  }
  .glow-blob.blue {
    width: 500px; height: 500px;
    bottom: 4%; right: 8%;
    background: radial-gradient(circle, rgba(99,102,241,0.14), transparent 70%);
  }

  /* ===== Hiệu ứng tuyết rơi ===== */
  .snow-container {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
    contain: strict;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.45));
  }

  .snow {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--size, 6px);
    height: var(--size, 6px);
    background: #fff;
    border-radius: 50%;
    opacity: var(--o, 0.8);
    transform: translate(var(--x), -10px);
    animation-duration: var(--duration, 18s);
    animation-delay: var(--delay, 0s);
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  @keyframes fall-1 { 40% { transform: translate(var(--x-end), 40vh); } 100% { transform: translate(var(--x-mid), 100vh); } }
  @keyframes fall-2 { 50% { transform: translate(var(--x-end), 50vh); } 100% { transform: translate(var(--x-mid), 100vh); } }
  @keyframes fall-3 { 60% { transform: translate(var(--x-end), 60vh); } 100% { transform: translate(var(--x-mid), 100vh); } }
  @keyframes fall-4 { 35% { transform: translate(var(--x-end), 35vh); } 100% { transform: translate(var(--x-mid), 100vh); } }
  @keyframes fall-5 { 70% { transform: translate(var(--x-end), 70vh); } 100% { transform: translate(var(--x-mid), 100vh); } }
  @keyframes fall-6 { 45% { transform: translate(var(--x-end), 45vh); } 100% { transform: translate(var(--x-mid), 100vh); } }

  /* ===== Bố cục chính ===== */
  .page-wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 40px 20px;
    animation: fadeInUp 1s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .counter {
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ===== Thẻ "liquid glass" ===== */
  .time-box {
    position: relative;
    min-width: 160px;
    min-height: 160px;
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--glass-1), var(--glass-2));
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    border: 1px solid var(--border);
    box-shadow:
      0 10px 40px rgba(0,0,0,0.4),
      0 0 0 rgba(var(--glow), 0),
      inset 0 1px 1px rgba(255,255,255,0.25),
      inset 0 -1px 1px rgba(0,0,0,0.2);
    overflow: hidden;
    will-change: transform;
    transition: transform 0.6s cubic-bezier(0.16,1,0.3,1),
                box-shadow 0.6s cubic-bezier(0.16,1,0.3,1),
                border-color 0.6s ease;
  }

  .time-box::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 220%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.16), transparent);
    transform: rotate(20deg) translateX(0%);
    will-change: transform;
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { transform: rotate(20deg) translateX(0%); }
    50%  { transform: rotate(20deg) translateX(475%); }
    100% { transform: rotate(20deg) translateX(475%); }
  }

  @media (hover: hover) and (pointer: fine) {
    .time-box:hover {
      transform: translateY(-8px) scale(1.04);
      border-color: rgba(var(--glow), 0.65);
      box-shadow:
        0 20px 55px rgba(var(--glow), 0.35),
        0 0 70px rgba(var(--glow), 0.25),
        inset 0 1px 1px rgba(255,255,255,0.3),
        inset 0 -1px 1px rgba(var(--glow), 0.15);
    }
  }

  .number {
    font-size: 54px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 0 rgba(var(--glow), 0);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: text-shadow 0.6s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
  }

  @media (hover: hover) and (pointer: fine) {
    .time-box:hover .number {
      text-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 60px rgba(var(--glow), 0.6);
    }
  }

  /* ===== Trên di động: hiệu ứng khi chạm thay cho hover ===== */
  @media (hover: none) {
    .time-box:active {
      transform: scale(0.97);
      border-color: rgba(var(--glow), 0.6);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.4),
        0 0 40px rgba(var(--glow), 0.3),
        inset 0 1px 1px rgba(255,255,255,0.3),
        inset 0 -1px 1px rgba(var(--glow), 0.15);
    }
    .time-box:active .number {
      text-shadow: 0 0 20px rgba(255,255,255,0.7), 0 0 40px rgba(var(--glow), 0.5);
    }
  }

  .number.tick { animation: pulse 0.4s ease; }

  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.16); }
    100% { transform: scale(1); }
  }

  .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .time-box { min-width: 120px; min-height: 120px; border-radius: 22px; padding: 14px; }
    .number { font-size: 34px; }
    .label { font-size: 10px; letter-spacing: 2px; }
    .counter { gap: 12px; }
  }

</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-blob pink"></div>
  <div class="glow-blob blue"></div>
  <div class="snow-container" id="snow-container"></div>

  <div class="page-wrap">
    <div class="counter">
      <div class="time-box"><div class="number" id="d">00</div><div class="label">Ngày</div></div>
      <div class="time-box"><div class="number" id="h">00</div><div class="label">Giờ</div></div>
      <div class="time-box"><div class="number" id="m">00</div><div class="label">Phút</div></div>
      <div class="time-box"><div class="number" id="s">00</div><div class="label">Giây</div></div>
    </div>
  </div>

<script>
  // ==================== ĐẾM THỜI GIAN ====================
  // Mốc bắt đầu: 07:00:00 ngày 12/03/2026 (giờ Việt Nam, UTC+7)
  // Muốn đổi mốc thời gian? Sửa dòng bên dưới.
  const START = new Date('2026-03-12T07:00:00+07:00').getTime();

  function setVal(id, value) {
    const el = document.getElementById(id);
    const text = String(value).padStart(2, '0');
    if (el.textContent !== text) {
      el.textContent = text;
      el.classList.remove('tick');
      void el.offsetWidth; // reflow để restart animation
      el.classList.add('tick');
    }
  }

  function tick() {
    let diff = Date.now() - START;
    if (diff < 0) diff = 0;
    const totalSec = Math.floor(diff / 1000);
    setVal('d', Math.floor(totalSec / 86400));
    setVal('h', Math.floor((totalSec % 86400) / 3600));
    setVal('m', Math.floor((totalSec % 3600) / 60));
    setVal('s', totalSec % 60);
  }
  tick();
  setInterval(tick, 1000);

  // ==================== HIỆU ỨNG TUYẾT RƠI ====================
  (function initSnow() {
    const container = document.getElementById('snow-container');
    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const COUNT = isMobile ? 60 : 150;  // ít bông tuyết hơn trên di động để mượt hơn
    const VARIANTS = 6;  // khớp với @keyframes fall-1..fall-6
    const fragment = document.createDocumentFragment();

    for (let i = 0; i < COUNT; i++) {
      const flake = document.createElement('div');
      flake.className = 'snow';

      const x = Math.random() * 100;
      const drift = Math.random() * 20 - 10;
      const size = (Math.random() * 3 + 2).toFixed(1);
      const duration = (Math.random() * 20 + 10).toFixed(1);
      const delay = (-Math.random() * duration).toFixed(1);
      const opacity = (Math.random() * 0.6 + 0.3).toFixed(2);
      const variant = Math.ceil(Math.random() * VARIANTS);

      flake.style.cssText =
        `--x:${x}vw;--x-end:${x + drift}vw;--x-mid:${x + drift / 2}vw;` +
        `--size:${size}px;--o:${opacity};--duration:${duration}s;--delay:${delay}s;` +
        `animation-name:fall-${variant}`;

      fragment.appendChild(flake);
    }
    container.appendChild(fragment);
  })();
</script>
</body>
</html>
