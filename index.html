<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Lotus:3</title>
<style>
  :root {
    --glow: 244, 114, 182; /* hồng sen - lotus pink */
    --glass-1: rgba(255,255,255,0.08);
    --glass-2: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #07070a;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Arial, sans-serif;
  }

  /* ===== Nền lưới caro di chuyển lên ===== */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 42px 42px;
    animation: gridMove 6s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 0 -42px; }
  }

  /* ===== Quầng sáng nền cho chiều sâu kiểu "liquid glass" ===== */
  .glow-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    z-index: 0;
    pointer-events: none;
  }
  .glow-blob.pink {
    width: 550px; height: 550px;
    top: 8%; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(var(--glow),0.18), transparent 70%);
  }
  .glow-blob.blue {
    width: 500px; height: 500px;
    bottom: 4%; right: 8%;
    background: radial-gradient(circle, rgba(99,102,241,0.14), transparent 70%);
  }

  /* ===== Bố cục chính ===== */
  .page-wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 40px 20px;
    animation: fadeInUp 1s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
  }

  .counter {
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ===== Thẻ "liquid glass" ===== */
  .time-box {
    position: relative;
    min-width: 160px;
    min-height: 160px;
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--glass-1), var(--glass-2));
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    border: 1px solid var(--border);
    box-shadow:
      0 10px 40px rgba(0,0,0,0.4),
      0 0 0 rgba(var(--glow), 0),
      inset 0 1px 1px rgba(255,255,255,0.25),
      inset 0 -1px 1px rgba(0,0,0,0.2);
    overflow: hidden;
    will-change: transform;
    transition: transform 0.6s cubic-bezier(0.16,1,0.3,1),
                box-shadow 0.6s cubic-bezier(0.16,1,0.3,1),
                border-color 0.6s ease;
  }

  .time-box::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 220%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.16), transparent);
    transform: rotate(20deg);
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { left: -60%; }
    50%  { left: 130%; }
    100% { left: 130%; }
  }

  .time-box:hover {
    transform: translateY(-8px) scale(1.04);
    border-color: rgba(var(--glow), 0.65);
    box-shadow:
      0 20px 55px rgba(var(--glow), 0.35),
      0 0 70px rgba(var(--glow), 0.25),
      inset 0 1px 1px rgba(255,255,255,0.3),
      inset 0 -1px 1px rgba(var(--glow), 0.15);
  }

  .number {
    font-size: 54px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 0 rgba(var(--glow), 0);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: text-shadow 0.6s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
  }

  .time-box:hover .number {
    text-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 60px rgba(var(--glow), 0.6);
  }

  .number.tick { animation: pulse 0.4s ease; }

  @keyframes pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.16); }
    100% { transform: scale(1); }
  }

  .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .time-box { min-width: 120px; min-height: 120px; border-radius: 22px; padding: 14px; }
    .number { font-size: 34px; }
    .label { font-size: 10px; letter-spacing: 2px; }
    .counter { gap: 12px; }
    .subtitle { font-size: 10px; letter-spacing: 2px; padding: 0 10px; }
  }

  /* ===== Tôn trọng người dùng muốn giảm chuyển động ===== */
  @media (prefers-reduced-motion: reduce) {
    .grid-bg, .time-box::before, .page-wrap { animation: none; }
    .number.tick { animation: none; }
    .time-box, .time-box:hover { transition: none; }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-blob pink"></div>
  <div class="glow-blob blue"></div>

    <div class="counter">
      <div class="time-box"><div class="number" id="d">00</div><div class="label">Ngày</div></div>
      <div class="time-box"><div class="number" id="h">00</div><div class="label">Giờ</div></div>
      <div class="time-box"><div class="number" id="m">00</div><div class="label">Phút</div></div>
      <div class="time-box"><div class="number" id="s">00</div><div class="label">Giây</div></div>
    </div>
  </div>

<script>
  // ==================== ĐẾM THỜI GIAN ====================
  // Mốc bắt đầu: 07:00:00 ngày 12/03/2026 (giờ Việt Nam, UTC+7)
  // Muốn đổi mốc thời gian? Sửa dòng bên dưới.
  const START = new Date('2026-03-12T07:00:00+07:00').getTime();

  function setVal(id, value) {
    const el = document.getElementById(id);
    const text = String(value).padStart(2, '0');
    if (el.textContent !== text) {
      el.textContent = text;
      el.classList.remove('tick');
      void el.offsetWidth; // reflow để restart animation
      el.classList.add('tick');
    }
  }

  function tick() {
    let diff = Date.now() - START;
    if (diff < 0) diff = 0;
    const totalSec = Math.floor(diff / 1000);
    setVal('d', Math.floor(totalSec / 86400));
    setVal('h', Math.floor((totalSec % 86400) / 3600));
    setVal('m', Math.floor((totalSec % 3600) / 60));
    setVal('s', totalSec % 60);
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
