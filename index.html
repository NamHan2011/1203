<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus</title>
    <!-- Nhúng Font chữ hiện đại từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            /* Tạo nền lưới kẻ caro tối giản giống ảnh của bạn */
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px; 
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: 5.5rem;
            margin: 0 0 40px 0;
            font-weight: 700;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(120deg, #ffffff, #ffb3e6, #ff66cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 102, 204, 0.6));
        }

        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Giao diện Kính mờ (Glassmorphism) cực sang */
        .time-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 30px;
            border-radius: 16px;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 102, 204, 0.4);
        }

        .time-box span {
            display: block;
            font-size: 3.8rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .time-box p {
            margin: 12px 0 0;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <canvas id="snow"></canvas>
    
    <div class="container">
        <h1>Lotus</h1>
        <div class="timer">
            <div class="time-box">
                <span id="days">00</span>
                <p>Ngày</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>Giờ</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>Phút</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>Giây</p>
            </div>
        </div>
    </div>

    <script>
        // Thiết lập thời gian gốc: 7h sáng ngày 12 tháng 3 năm 2026
        const startDate = new Date('March 12, 2026 07:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const difference = now - startDate;

            if (difference < 0) return;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Hiệu ứng tuyết rơi mượt mà
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let particles = [];

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2.5 + 1,
                speedY: Math.random() * 0.7 + 0.3,
                speedX: Math.random() * 1 - 0.5
            });
        }

        function drawSnowflakes() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            updateSnowflakes();
        }

        function updateSnowflakes() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.y += p.speedY;
                p.x += p.speedX;
                if (p.y > height) {
                    particles[i] = { x: Math.random() * width, y: -10, r: p.r, speedY: p.speedY, speedX: p.speedX };
                }
            }
        }

        function anim() {
            drawSnowflakes();
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
