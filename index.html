<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            /* Tự động tạo nền lưới caro giống hệt ảnh của bạn */
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: 40px 40px; /* Kích thước ô vuông */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Lớp canvas để vẽ tuyết rơi */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Hộp chứa nội dung nổi lên trên nền */
        .container {
            z-index: 1;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 50px 70px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 5rem;
            margin: 0 0 30px 0;
            letter-spacing: 10px;
            text-transform: uppercase;
            /* Hiệu ứng phát sáng nhẹ màu hồng sen cho chữ Lotus */
            text-shadow: 0 0 10px #fff, 0 0 20px #ffb3e6, 0 0 40px #ff66cc; 
        }

        .timer {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 25px;
            border-radius: 12px;
            min-width: 90px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .time-box span {
            display: block;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 15px #00ffff; /* Số đếm sáng màu xanh Cyan */
        }

        .time-box p {
            margin: 10px 0 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #cccccc;
        }
    </style>
</head>
<body>
    <canvas id="snow"></canvas>
    
    <div class="container">
        <h1>Lotus</h1>
        <div class="timer">
            <div class="time-box">
                <span id="days">00</span>
                <p>Ngày</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>Giờ</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>Phút</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>Giây</p>
            </div>
        </div>
    </div>

    <script>
        // --- CÀI ĐẶT THỜI GIAN ---
        // Bạn có thể sửa năm 2026 thành năm bạn muốn bắt đầu đếm
        const startDate = new Date('March 12, 2026 07:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const difference = now - startDate;

            // Nếu thời gian ở tương lai (chưa tới mốc) thì hiển thị 0
            if (difference < 0) {
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // --- HIỆU ỨNG TUYẾT RƠI (CANVAS) ---
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let particles = [];

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Tạo 150 bông tuyết
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1, // Kích thước
                d: Math.random() * 150,
                speedY: Math.random() * 1 + 0.5, // Tốc độ rơi thẳng
                speedX: Math.random() * 2 - 1 // Tốc độ bay ngang
            });
        }

        function drawSnowflakes() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            updateSnowflakes();
        }

        function updateSnowflakes() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.y += p.speedY;
                p.x += p.speedX;

                // Nếu tuyết rơi khỏi màn hình thì cho xuất hiện lại ở trên cùng
                if (p.y > height) {
                    particles[i] = { x: Math.random() * width, y: -10, r: p.r, d: p.d, speedY: p.speedY, speedX: p.speedX };
                }
            }
        }

        setInterval(drawSnowflakes, 30); // Tốc độ làm mới khung hình
    </script>
</body>
</html>
